<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Projects</title>

<style>

:root{
    --primary:#00C389;
    --primary-dark:#009E70;
    --bg:#F6F8F7;
    --card:#FFFFFF;
    --text:#111827;
    --text-light:#6B7280;
    --border:#E5E7EB;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Inter, system-ui, sans-serif;
    background:var(--bg);
    color:var(--text);
}

.container{
    max-width:1200px;
    margin:auto;
    padding:80px 24px;
}

.hero{
    text-align:center;
    margin-bottom:70px;
}

.badge{
    display:inline-block;
    padding:8px 16px;
    border-radius:999px;
    background:rgba(0,195,137,.1);
    color:var(--primary-dark);
    font-size:14px;
    font-weight:600;
    margin-bottom:24px;
}

h1{
    font-size:clamp(3rem,8vw,5rem);
    font-weight:800;
    line-height:1;
    letter-spacing:-2px;
}

.subtitle{
    max-width:600px;
    margin:24px auto 0;
    color:var(--text-light);
    font-size:1.1rem;
}

.cards{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:28px;
}

.card{
    text-decoration:none;
    color:inherit;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:24px;
    padding:32px;
    min-height:260px;
    position:relative;

    transition:.25s ease;
}

.card:hover{
    transform:translateY(-6px);
    border-color:var(--primary);
    box-shadow:
    0 20px 50px rgba(0,0,0,.08);
}

.number{
    color:var(--primary);
    font-weight:700;
    font-size:14px;
    margin-bottom:50px;
}

.card h2{
    font-size:2rem;
    margin-bottom:10px;
    letter-spacing:-1px;
}

.card p{
    color:var(--text-light);
}

.arrow{
    position:absolute;
    bottom:24px;
    right:24px;

    width:52px;
    height:52px;

    border-radius:50%;

    background:var(--primary);
    color:white;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:1.3rem;
    transition:.25s ease;
}

.card:hover .arrow{
    transform:rotate(45deg);
    background:var(--primary-dark);
}

.footer{
    text-align:center;
    margin-top:80px;
    color:var(--text-light);
    font-size:.9rem;
}

@media(max-width:900px){

    .cards{
        grid-template-columns:1fr;
    }

    .card{
        min-height:220px;
    }

    h1{
        font-size:3rem;
    }
}

</style>
</head>

<body>

<div class="container">

    <section class="hero">

        <div class="badge">
            External Resources
        </div>

        <h1>
            Project Links
        </h1>

        <p class="subtitle">
            Quick access to the selected platforms and solutions.
        </p>

    </section>

    <section class="cards">

        <a class="card"
           href="https://kodiakgas.com/power-solutions/"
           target="_blank">

            <div class="number">01</div>

            <h2>Kodiak Gas</h2>

            <p>Power Solutions</p>

            <div class="arrow">↗</div>

        </a>

        <a class="card"
           href="https://go.qct.io/qct-ai-pod/"
           target="_blank">

            <div class="number">02</div>

            <h2>QCT</h2>

            <p>AI Pod</p>

            <div class="arrow">↗</div>

        </a>

        <a class="card"
           href="https://dynamisps.com/"
           target="_blank">

            <div class="number">03</div>

            <h2>Dynamis</h2>

            <p>Power Solutions</p>

            <div class="arrow">↗</div>

        </a>

    </section>

</div>

</body>
</html>
